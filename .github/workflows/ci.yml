name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build backend/Bebrakumpis.slnx --configuration Release

      - name: Test
        run: dotnet test backend/Bebrakumpis.slnx --configuration Release --no-build --logger "trx" --results-directory TestResults

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-html5/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend-html5

      - name: Build
        run: npm run build
        working-directory: frontend-html5
        env:
          VITE_API_BASE_URL: http://localhost
